name: zero_waste_citizen
description: A cross-platform Flutter app that helps citizens segregate waste, schedule pickups, earn eco rewards, and engage with local recycling communities.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1
  google_maps_flutter: ^2.9.0
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  intl: ^0.20.2
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
